version: '3.8'

services:
  # ----------------------------------------------------
  # FRONTEND: NEXT.JS 15
  # ----------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eoms_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - eoms_net

  # ----------------------------------------------------
  # BACKEND: FASTAPI
  # ----------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eoms_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/eoms_db
      - REDIS_URL=redis://redis:6379/0
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=admin123
      - JWT_SECRET=super_secret_eoms_key_change_me
    depends_on:
      - db
      - redis
      - minio
    networks:
      - eoms_net

  # ----------------------------------------------------
  # DATABASE: POSTGRESQL
  # ----------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: eoms_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=eoms_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - eoms_net

  # ----------------------------------------------------
  # CACHE & QUEUE: REDIS
  # ----------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: eoms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - eoms_net

  # ----------------------------------------------------
  # STORAGE: MINIO (S3 Alternative)
  # ----------------------------------------------------
  minio:
    image: minio/minio
    container_name: eoms_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=admin123
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    networks:
      - eoms_net

networks:
  eoms_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
